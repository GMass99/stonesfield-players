[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "18"

# Redirects for old URLs (from the original static site)
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/about.html"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/events.html"
  to = "/events/"
  status = 301

[[redirects]]
  from = "/contact.html"
  to = "/contact/"
  status = 301
