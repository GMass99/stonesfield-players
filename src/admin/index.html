<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stonesfield Players — Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script src="/admin/preview.js"></script>
  <script>
    // Hide the "Sort by" bar and view toggles on collection pages
    setInterval(function() {
      // Find any element containing "Sort by" text
      var spans = document.querySelectorAll('span');
      for (var i = 0; i < spans.length; i++) {
        if (spans[i].textContent.trim() === 'Sort by') {
          // Hide the parent container that holds Sort by + view toggles
          var row = spans[i].closest('div');
          if (row && row.parentElement) {
            row.parentElement.style.display = 'none';
          }
        }
      }
    }, 500);
  </script>
</body>
</html>
