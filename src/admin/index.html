<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stonesfield Players — Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script src="/admin/preview.js"></script>
  <script>
    setInterval(function() {
      // Hide "Sort by" bar
      var spans = document.querySelectorAll('span');
      for (var i = 0; i < spans.length; i++) {
        if (spans[i].textContent.trim() === 'Sort by') {
          var row = spans[i].closest('div');
          if (row && row.parentElement) {
            row.parentElement.style.display = 'none';
          }
        }
      }

      // Style collection list entries as big clickable cards
      var listItems = document.querySelectorAll('li[class] a[href*="/entries/"]');
      for (var j = 0; j < listItems.length; j++) {
        var link = listItems[j];
        if (link.dataset.styled) continue;
        link.dataset.styled = '1';
        link.style.display = 'flex';
        link.style.alignItems = 'center';
        link.style.justifyContent = 'space-between';
        link.style.padding = '1.25rem 1.5rem';
        link.style.fontSize = '1.1rem';
        link.style.fontWeight = '600';
        link.style.background = '#f8f8f6';
        link.style.border = '2px solid #e8e8e6';
        link.style.borderRadius = '6px';
        link.style.margin = '0.5rem 0';
        link.style.cursor = 'pointer';
        link.style.transition = 'all 0.2s ease';

        // Add arrow icon
        var arrow = document.createElement('span');
        arrow.textContent = 'Click to edit →';
        arrow.style.fontSize = '0.85rem';
        arrow.style.color = '#c8a96e';
        arrow.style.fontWeight = '500';
        link.appendChild(arrow);

        // Hover effect
        link.addEventListener('mouseenter', function() {
          this.style.borderColor = '#c8a96e';
          this.style.background = '#fff';
        });
        link.addEventListener('mouseleave', function() {
          this.style.borderColor = '#e8e8e6';
          this.style.background = '#f8f8f6';
        });
      }
    }, 500);
  </script>
</body>
</html>
